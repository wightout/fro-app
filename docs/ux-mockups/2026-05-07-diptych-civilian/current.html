<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">

<body>
<div class="wrap">
  <span class="mock-tag">Current state · live on site</span>
  <div class="section-head">
    <span class="num">§ 3</span>
    <h2>Sticky notes, made searchable</h2>
    <span class="right">Premise · Military source</span>
  </div>

  <div class="diptych">
    <figure>
      <div class="tmpage">
        <div class="tm-hd"><span><b>TM 1-1500-204</b> · PG 7-3</span><span>FIG 7-2</span></div>
        <div class="tm-title">Engine Cowling — Removal</div>
        <div class="tm-section">7.3.2 · Procedure</div>
        <div class="tm-step"><span class="num">01.</span><span>Disconnect electrical bonding strap.</span></div>
        <div class="tm-step struck"><span class="num">02.</span><span class="body">Apply torque to fastener per Fig 4-12 spec.</span><span class="handwrite">use 12pt deep socket</span></div>
        <div class="tm-step"><span class="num">03.</span><span>Remove forward fairing screws (qty 6).</span></div>
        <div class="tm-step"><span class="num">04.</span><span>Lift cowl assembly clear of mounting brackets.</span></div>
        <div class="tm-section">7.3.3 · Cautions</div>
        <div class="tm-step"><span class="num">—</span><span>Ground strap routing per diagram 7-2.</span></div>
        <div class="tm-step"><span class="num">—</span><span>Use approved hazmat per appendix B.</span></div>
        <div class="sticky s1">spec socket rounds the head every time<small>— J. Reyes, 4/12</small></div>
        <div class="sticky s2">ground strap goes left of bracket, not right — fixed twice<small>see pg 11-9</small></div>
      </div>
      <figcaption class="dip-cap before"><b>Before — the TM in the binder</b>Knowledge lives on stickies and pencil margins. Useful to whoever's holding the page.</figcaption>
    </figure>
    <figure>
      <div class="froentry">
        <div class="fr-hd"><span><b>FRO</b> · JOB #0247</span><span><span class="pip"></span>LOGGED 04/12</span></div>
        <div class="fr-title">Engine Cowling — Removal</div>
        <div class="fr-meta">
          <span class="l">Aircraft</span><span class="v">UH-60M · 21-26789</span>
          <span class="l">System</span><span class="v">Powerplant · Cowling</span>
          <span class="l">Time on task</span><span class="v">1 h 40 m</span>
          <span class="l">Reference</span><span class="v">TM 1-1500-204 pg 7-3</span>
        </div>
        <div class="fr-section">Tools used</div>
        <div class="fr-row"><span class="fr-tag">12pt deep socket ½"</span><span class="fr-tag">torque wrench cal 02/26</span><span class="fr-tag">cowling stand</span></div>
        <div class="fr-section">Notes for next time</div>
        <div class="fr-row note">Spec socket from TM <b>rounds the head</b> — use the deep 12pt instead. Confirmed on two prior jobs.</div>
        <div class="fr-row note">Ground strap routes <b>left</b> of the bracket. The diagram on pg 7-2 shows it on the right; that's wrong on this airframe.</div>
        <div class="fr-section">Search hits this entry on</div>
        <div class="fr-row"><span class="fr-tag">cowling</span><span class="fr-tag">socket rounds</span><span class="fr-tag">ground strap</span><span class="fr-tag">UH-60M</span><span class="fr-tag">pg 7-3</span></div>
      </div>
      <figcaption class="dip-cap after"><b>After — the same notes, in FRO</b>Searchable, readable, shareable. The sticky finally has a home.</figcaption>
    </figure>
  </div>

  <p class="mock-note">Baseline. Reads as military-only because both sides reference TM 1-1500-204 / UH-60M. Civilian readers may assume FRO is military-only.</p>
</div>
